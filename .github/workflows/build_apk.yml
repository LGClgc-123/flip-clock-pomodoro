name: Flutter自动打包APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK（安卓编译必备）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          cache: true

      - name: 切换国内Pub镜像，解决依赖下载超时
        run: flutter pub config set registry https://pub.flutter-io.cn

      - name: 下载项目依赖
        run: flutter pub get

      - name: 编译Release正式APK
        run: flutter build apk --release

      - name: 上传APK成品
        uses: actions/upload-artifact@v4
        with:
          name: 番茄时钟APK安装包
          path: build/app/outputs/apk/release/app-release.apk


