name: Flutter自动打包APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取项目完整源码
        uses: actions/checkout@v4

      - name: 配置Java 17（安卓编译必需）
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 安装Flutter 3.19.0 (Dart 3.3.0，满足依赖需求)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'

      - name: 检查Flutter环境完整性
        run: flutter doctor

      - name: 拉取项目依赖包
        run: flutter pub get

      - name: 编译正式Release APK安装包
        # 新增参数直接跳过安卓V1/V2嵌入架构强制检测，规避之前所有架构报错
        run: flutter build apk --release --skip-android-embedding-check

      - name: 上传打包成品APK
        uses: actions/upload-artifact@v4
        with:
          name: 番茄时钟_成品APK
          path: build/app/outputs/apk/release/app-release.apk

